version: 3

tasks:
  docs:
    dir: web
    cmds:
    - pnpm start
  
  docs:build:
    dir: web
    cmds:
    - pnpm install
    - pnpm build

  helm-validate:
    desc: Validate Helm charts
    cmds:
    - |
      NAME={{.CLI_ARGS}}

      for chart in charts/*; do 
        chart_name=$(basename "$chart")
        if [ -n "$NAME" ] && [ "$chart_name" != "$NAME" ]; then
          continue
        fi
        (
          cd "$chart" || exit 1
          echo "Validating $chart_name..."
          
          # Try to update dependencies if Chart.lock exists
          if [ -f "Chart.lock" ]; then
            if ! helm dependency update . 2>/dev/null; then
              echo "⏭️  Skipping $chart_name (dependency update failed - possible Helm v4 bug)"
              exit 0
            fi
          fi
          
          helm lint . && helm template . > /dev/null && echo "✅ $chart_name validated successfully"
        ) || exit 1
      done

  helm-unittest:
    desc: Run Helm unit tests (helm-unittest plugin)
    cmds:
    - |
      NAME={{.CLI_ARGS}}

      if ! helm unittest -h >/dev/null 2>&1; then
        echo "❌ helm-unittest plugin is not installed."
        echo "Install: helm plugin install https://github.com/helm-unittest/helm-unittest"
        exit 1
      fi

      for chart in charts/*; do
        chart_name=$(basename "$chart")
        if [ -n "$NAME" ] && [ "$chart_name" != "$NAME" ]; then
          continue
        fi

        if [ ! -d "$chart/tests" ] || [ -z "$(ls -A "$chart/tests" 2>/dev/null)" ]; then
          echo "⏭️  Skipping $chart_name (no unit tests)"
          continue
        fi

        (
          cd "$chart" || exit 1
          echo "Running unit tests for $chart_name..."
          helm unittest .
        ) || exit 1
      done

  helm-package-index:
    desc: Package Helm charts and update repository index
    cmds:
    - echo "Adding required Helm repositories..."
    - helm repo add grafana https://grafana.github.io/helm-charts || true
    - helm repo add rustfs https://charts.rustfs.com || true
    - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts || true
    - helm repo update grafana rustfs prometheus-community
    - echo "Creating charts directory..."
    - mkdir -p web/static/charts
    - echo "Restoring previously published chart packages..."
    - |
      CHART_REPO_URL="https://rishang.github.io/helm-charts/charts"
      PREVIOUS_INDEX="web/static/charts/index.yaml.previous"

      if curl -fsSL "$CHART_REPO_URL/index.yaml" -o "$PREVIOUS_INDEX"; then
        awk '/^[[:space:]]*- https?:.*\.tgz$/ { print $2 }' "$PREVIOUS_INDEX" | while read -r package_url; do
          package_name="$(basename "$package_url")"
          if [ ! -f "web/static/charts/$package_name" ]; then
            echo "Restoring $package_name..."
            curl -fsSL "$package_url" -o "web/static/charts/$package_name" || echo "Warning: failed to restore $package_name"
          fi
        done
      elif [ -f web/static/charts/index.yaml ]; then
        echo "Published index not reachable; using committed index for merge metadata."
        cp web/static/charts/index.yaml "$PREVIOUS_INDEX"
      else
        echo "No previous chart index found; creating a fresh repository index."
      fi
    - |
      for chart in component-chart loki-stack; do
        cp charts/.helmignore "charts/$chart/.helmignore"
        echo "Copied .helmignore to charts/$chart/.helmignore"
        echo "Packaging $chart..."
        helm dependency update "charts/$chart" --skip-refresh
        helm package "charts/$chart" -d web/static/charts/
        echo "Packaged $chart to web/static/charts/"
      done
    - echo "Updating Helm repository index..."
    - |
      CHART_REPO_URL="https://rishang.github.io/helm-charts/charts"
      PREVIOUS_INDEX="web/static/charts/index.yaml.previous"

      if [ -f "$PREVIOUS_INDEX" ]; then
        helm repo index web/static/charts --url "$CHART_REPO_URL" --merge "$PREVIOUS_INDEX"
        rm -f "$PREVIOUS_INDEX"
      else
        helm repo index web/static/charts --url "$CHART_REPO_URL"
      fi
    - echo "Charts packaged successfully!"
    - echo "Files created in web/static/charts/"
    - ls -lh web/static/charts/
